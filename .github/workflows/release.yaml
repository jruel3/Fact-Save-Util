name: Build Installer

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Build Go DLL
        run: go build -buildmode=c-shared -o fact_logic.dll ./go/fact_logic.go

      - name: Build Flutter
        run: |
          flutter pub get
          flutter build windows --release

      - name: Bundle DLL
        run: copy fact_logic.dll build\windows\runner\Release\

      - name: Compile Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_script.iss
        shell: pwsh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/installer/FactSaveUtil_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}