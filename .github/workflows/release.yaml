name: Build Installer

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Build Go DLL
        run: |
          cd go
          go mod tidy
          go build -buildmode=c-shared -o ../fact_logic.dll ./fact_logic.go

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Check Flutter Path
        run: |
          where.exe flutter
          flutter --version

      - name: Build Flutter
        shell: pwsh
        run: |
          flutter pub get
          flutter build windows --release

      - name: Bundle DLL
        shell: pwsh
        run: |
          if (Test-Path "fact_logic.dll") {
            Copy-Item -Path "fact_logic.dll" -Destination "build\windows\x64\runner\Release\"
          }

      - name: Compile Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_script.iss
        shell: pwsh

      - name: Create Release and Upload Asset
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Release ${context.ref.replace('refs/tags/', '')}`,
              draft: false,
              prerelease: false
            });
            
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: 'FactSaveUtil_Setup.exe',
              data: fs.readFileSync('build/installer/FactSaveUtil_Setup.exe')
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}