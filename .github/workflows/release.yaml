name: Build Installer

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Build Go DLL
        run: |
          cd go
          go mod tidy
          go build -buildmode=c-shared -o ../fact_logic.dll ./fact_logic.go

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Check Flutter Path
        run: |
          where.exe flutter
          flutter --version

      - name: Build Flutter
        shell: pwsh
        run: |
          flutter pub get
          flutter build windows --release

      - name: List Files for Debugging
        run: Get-ChildItem -Recurse build\windows

      - name: Bundle DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\windows\x64\runner\Release\
          Copy-Item -Path "go/fact_logic.dll" -Destination "build\windows\x64\runner\Release\"

      - name: Compile Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_script.iss
        shell: pwsh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/installer/FactSaveUtil_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}